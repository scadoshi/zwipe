name: Deploy zerver

on:
  push:
    branches: [main]
    paths:
      - 'zerver/**'
      - 'zwipe/**'
      - 'zervice/**'
      - '.github/workflows/deploy-zerver.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        env:
          SQLX_OFFLINE: true
        run: cargo build --release --bin zerver --bin zervice

      - name: Deploy
        run: |
          sudo systemctl stop zerver
          cp target/release/zerver target/release/zervice ~/zwipe/
          sudo systemctl start zerver
