name: Deploy zite

on:
  push:
    branches: [main]
    paths:
      - 'zite/**'
      - 'zwipe-core/**'
      - 'zwipe-components/**'
      - '.github/workflows/deploy-zite.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Gate the build/deploy on the test suite. Full core + zerver suite (not just
  # core) since zite is growing into the authenticated web app that will exercise
  # sessions and server behavior directly.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      SQLX_OFFLINE: "true" # compile against committed .sqlx; #[sqlx::test] uses DATABASE_URL at runtime
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test -p zwipe-core -p zerver

  build:
    needs: test # blocked if tests fail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        # Caches the compiled dependency graph (native + wasm). Prunes zite's own
        # artifacts so the cache stays lean, and uses restore-keys for partial
        # hits when Cargo.lock changes — far better hit rate than a raw target/ cache.
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: zite
          cache-all-crates: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install dioxus-cli
        # Fetches a prebuilt dx binary instead of compiling dioxus-cli from
        # source (which a `cargo install --force` would do on every run, ~minutes).
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli@0.7.9

      - name: Build (SSG)
        working-directory: zite
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: gcc
        # --ssg pre-renders every route returned from the app's static_routes
        # server function into target/dx/zite/release/web/public/<route>/index.html.
        # The wasm bundle still hydrates after load. Dynamic routes
        # (/verify/:token, /reset/:token) are excluded automatically and fall
        # back to SPA hydration via the 404.html step below.
        #
        # --force-sequential is required: it builds the client first, then runs
        # the server + SSG step. Without it, the parallel client build finishes
        # last and overwrites the SSG'd public/index.html with the bare shell.
        run: dx build --release --platform web --ssg --force-sequential

      - name: Add CNAME
        run: echo "zwipe.net" > target/dx/zite/release/web/public/CNAME

      - name: Add 404.html for SPA routing
        run: cp target/dx/zite/release/web/public/index.html target/dx/zite/release/web/public/404.html

      - name: Upload Pages artifact
        # v5 pairs with deploy-pages@v5 and pulls a Node-24 upload-artifact
        # internally (v3 pinned upload-artifact@v4 → Node-20 deprecation warning).
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/dx/zite/release/web/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
