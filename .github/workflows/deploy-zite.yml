name: Deploy zite

on:
  push:
    branches: [main]
    paths:
      - 'zite/**'
      - 'zwipe-core/**'
      - 'shared/**'
      - '.github/workflows/deploy-zite.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-zite-${{ hashFiles('zite/Cargo.lock') }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install dioxus-cli
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: gcc
        run: cargo install dioxus-cli --version "^0.7" --locked --force

      - name: Build (SSG)
        working-directory: zite
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: gcc
        # --ssg pre-renders every route returned from the app's static_routes
        # server function into target/dx/zite/release/web/public/<route>/index.html.
        # The wasm bundle still hydrates after load. Dynamic routes
        # (/verify/:token, /reset/:token) are excluded automatically and fall
        # back to SPA hydration via the 404.html step below.
        #
        # --force-sequential is required: it builds the client first, then runs
        # the server + SSG step. Without it, the parallel client build finishes
        # last and overwrites the SSG'd public/index.html with the bare shell.
        run: dx build --release --platform web --ssg --force-sequential

      - name: Add CNAME
        run: echo "zwipe.net" > target/dx/zite/release/web/public/CNAME

      - name: Add 404.html for SPA routing
        run: cp target/dx/zite/release/web/public/index.html target/dx/zite/release/web/public/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/dx/zite/release/web/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
