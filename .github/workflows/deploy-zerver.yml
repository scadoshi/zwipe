name: Deploy zerver

on:
  push:
    branches: [main]
    paths:
      - 'zerver/**'
      - 'zwipe-core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.sqlx/**'
      - '.github/workflows/deploy-zerver.yml'
  workflow_dispatch:

jobs:
  # Gate the deploy on the test suite. Runs on a GitHub-hosted runner with a
  # throwaway Postgres; the deploy job below only runs if this passes.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      SQLX_OFFLINE: "true" # compile against committed .sqlx; #[sqlx::test] uses DATABASE_URL at runtime
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test -p zwipe-core -p zerver

  deploy:
    needs: test # blocked if tests fail
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '.sqlx/**') }}

      - name: Run migrations
        run: |
          set -a
          source ~/zwipe/.env
          set +a
          cargo sqlx migrate run --source zerver/migrations

      # Fail fast if the committed .sqlx offline data has drifted from the
      # (just-migrated) prod schema — the exact failure mode of 2026-07-05.
      # Exclude the GUI crates: --check compiles crates to find their queries,
      # zwiper's Linux desktop deps (glib/GTK) don't exist on the headless VPS,
      # and only zerver has queries anyway (broke the 2026-07-06 deploy).
      - name: Verify offline query data
        run: |
          set -a
          source ~/zwipe/.env
          set +a
          cargo sqlx prepare --workspace --check -- --workspace --exclude zwiper --exclude zite

      - name: Build
        env:
          SQLX_OFFLINE: true
        run: cargo build --release --bin zerver --bin zervice

      - name: Deploy
        run: |
          sudo systemctl stop zerver
          cp target/release/zerver target/release/zervice ~/zwipe/
          sudo systemctl start zerver
