<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verify your Zwipe email</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body, p, a, span, div {
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, 'Courier New', monospace !important;
    }
  </style>
</head>
<body style="margin:0;padding:0;font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,'Courier New',monospace;">
  <div style="max-width:480px;margin:0 auto;padding:3rem 2rem;font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,'Courier New',monospace;">

    <p style="font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,'Courier New',monospace;font-size:1.1rem;letter-spacing:0.15em;font-weight:300;margin:0 0 2.5rem 0;">Zwipe</p>

    <p style="font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,'Courier New',monospace;font-size:0.95rem;font-weight:300;line-height:1.6;margin:0 0 0.5rem 0;">Hi,</p>
    <p style="font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,'Courier New',monospace;font-size:0.95rem;font-weight:300;line-height:1.6;margin:0 0 2rem 0;">
      Click below to verify your email address.
      This link expires in <span style="font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,'Courier New',monospace;font-weight:400;">24 hours</span>.
    </p>

    <a href="{link}"
       style="display:inline-block;
              padding:0.75rem 1.5rem;
              border:1px solid currentColor;
              border-radius:0.75rem;
              text-decoration:none;
              font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,'Courier New',monospace;
              font-size:0.85rem;
              font-weight:300;
              letter-spacing:0.1em;">
      Verify email
    </a>

    <p style="font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,'Courier New',monospace;font-size:0.75rem;line-height:1.6;margin:2.5rem 0 0 0;opacity:0.5;">
      If you didn't create a Zwipe account, you can safely ignore this email.
    </p>

  </div>
</body>
</html>
