name: Test

# Pre-merge signal on pull requests. Pushes to main gate on the inline `test`
# job in deploy-zerver.yml / deploy-zite.yml, so this stays PR-only — no point
# running the suite twice on a push.

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16 # match the VPS major version
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      # Compile the query! macros against the committed .sqlx offline data, NOT
      # the empty service DB. #[sqlx::test] still uses DATABASE_URL at runtime to
      # create + migrate a fresh DB per test. (.sqlx drift is guarded by the
      # deploy workflow's `cargo sqlx prepare --check`.)
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # -p zwipe-core -p zerver, never --workspace: on a headless Linux runner,
      # compiling zwiper pulls Dioxus desktop's GTK stack (glib-sys) and fails.
      - name: Test
        run: cargo test -p zwipe-core -p zerver

  # Format + lint gate. fmt runs workspace-wide (parse-only, no GTK); clippy is
  # scoped to zwipe-core + zerver for the same headless-GTK reason as Test.
  lint:
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true" # clippy compiles the query! macros against committed .sqlx
    steps:
      - uses: actions/checkout@v7
      # nightly first, stable last so `cargo`/`cargo clippy` default to stable;
      # nightly is only for `cargo +nightly fmt` (rustfmt.toml uses the unstable
      # imports_granularity = "Crate", which stable rustfmt ignores).
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo +nightly fmt --check
      - name: Clippy
        run: cargo clippy -p zwipe-core -p zerver --all-targets -- -D warnings
