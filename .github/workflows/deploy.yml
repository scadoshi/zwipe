name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'zerver/**'
      - 'zwipe/**'
      - 'zervice/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Build
        env:
          SQLX_OFFLINE: true
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: gcc
        run: cargo build --release --bin zerver --bin zervice

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ vars.DEPLOY_HOST }}
          USER: ${{ vars.DEPLOY_USER }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            target/release/zerver target/release/zervice \
            $USER@$HOST:~/zwipe/
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no $USER@$HOST \
            "sudo systemctl restart zerver"
          rm /tmp/deploy_key
