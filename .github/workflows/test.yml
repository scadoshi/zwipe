name: Test

# Pre-merge signal on pull requests. Pushes to main gate on the inline `test`
# job in deploy-zerver.yml / deploy-zite.yml, so this stays PR-only — no point
# running the suite twice on a push.

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16 # match the VPS major version
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      # Compile the query! macros against the committed .sqlx offline data, NOT
      # the empty service DB. #[sqlx::test] still uses DATABASE_URL at runtime to
      # create + migrate a fresh DB per test. (.sqlx drift is guarded by the
      # deploy workflow's `cargo sqlx prepare --check`.)
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # -p zwipe-core -p zerver, never --workspace: on a headless Linux runner,
      # compiling zwiper pulls Dioxus desktop's GTK stack (glib-sys) and fails.
      - name: Test
        run: cargo test -p zwipe-core -p zerver
