name: Deploy zerver

on:
  push:
    branches: [main]
    paths:
      - 'zerver/**'
      - 'zwipe-core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.sqlx/**'
      - '.github/workflows/deploy-zerver.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '.sqlx/**') }}

      - name: Run migrations
        run: |
          set -a
          source ~/zwipe/.env
          set +a
          cargo sqlx migrate run --source zerver/migrations

      # Fail fast if the committed .sqlx offline data has drifted from the
      # (just-migrated) prod schema — the exact failure mode of 2026-07-05.
      - name: Verify offline query data
        run: |
          set -a
          source ~/zwipe/.env
          set +a
          cargo sqlx prepare --workspace --check

      - name: Build
        env:
          SQLX_OFFLINE: true
        run: cargo build --release --bin zerver --bin zervice

      - name: Deploy
        run: |
          sudo systemctl stop zerver
          cp target/release/zerver target/release/zervice ~/zwipe/
          sudo systemctl start zerver
